<svg width="100%" viewBox="0 0 512 522" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F3358"/>
      <stop offset="100%" stop-color="#1a4a78"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8040"/>
      <stop offset="100%" stop-color="#FF5C00"/>
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="40" style="fill:none;stroke:rgba(255, 255, 255, 0.04);color:rgb(0, 0, 0);stroke-width:40px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Eye shape -->
  <path d="M 100 240 Q 256 124 412 240 Q 256 356 100 240 Z" fill="none" stroke="url(#eyeGrad)" stroke-width="14" stroke-linejoin="round" style="fill:none;color:rgb(0, 0, 0);stroke-width:14px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Iris -->
  <circle cx="256" cy="240" r="58" fill="none" stroke="url(#eyeGrad)" stroke-width="10" style="fill:none;color:rgb(0, 0, 0);stroke-width:10px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Pupil -->
  <circle cx="256" cy="240" r="26" fill="url(#eyeGrad)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Reflection -->
  <circle cx="272" cy="226" r="8" fill="white" opacity="0.7" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Divider line -->
  <line x1="140" y1="296" x2="372" y2="296" stroke="#FF5C00" stroke-width="1.5" opacity="0.35" style="fill:rgb(0, 0, 0);stroke:rgb(255, 92, 0);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Prof. -->
  <text x="256" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="400" letter-spacing="5" fill="rgba(255,255,255,0.55)" style="fill:rgba(255, 255, 255, 0.55);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:15px;font-weight:400;text-anchor:middle;dominant-baseline:auto">PROF. DR.</text>

  <!-- Toprak -->
  <text x="256" y="378" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="600" letter-spacing="3" fill="white" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:44px;font-weight:600;text-anchor:middle;dominant-baseline:auto">Toprak</text>

  <!-- Subtitle -->
  <text x="256" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="4" fill="rgba(255,255,255,0.35)" style="fill:rgba(255, 255, 255, 0.35);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">OFTALMOLOJİ</text>
</svg>